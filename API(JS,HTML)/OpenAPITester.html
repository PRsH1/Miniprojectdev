<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eformsign Open API Tester</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.25/jsrsasign-all-min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sidebar-w: 280px;
            --sidebar-bg: #1e2a38;
            --sidebar-hover: #2a3a4f;
            --sidebar-selected: #2d7be0;
            --sidebar-text: #c9d4df;
            --sidebar-muted: #7a8fa6;
            --header-h: 52px;
            --auth-bg: #f9fafb;
            --border: #e2e8f0;
            --bg: #f1f5f9;
            --white: #ffffff;
            --blue: #2d7be0;
            --blue-dark: #1a5fb4;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body { font-family: var(--font); background: var(--bg); color: #1a202c; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ========== HEADER ========== */
        .app-header {
            height: var(--header-h);
            background: var(--sidebar-bg);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
            border-bottom: 1px solid #0d1820;
        }
        .app-header .logo { color: #fff; font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
        .app-header .logo span { color: #4fa8ff; }
        .app-header .env-select-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .app-header label { color: var(--sidebar-muted); font-size: 0.82rem; }
        .app-header select {
            background: #2a3a4f; color: #fff; border: 1px solid #3a4f6a;
            border-radius: 6px; padding: 5px 10px; font-size: 0.85rem; cursor: pointer;
        }
        .app-header select:focus { outline: none; border-color: var(--blue); }
        #customDomainWrap { display: none; }
        #customDomainInput {
            background: #2a3a4f; color: #fff; border: 1px solid #e6a817;
            border-radius: 6px; padding: 5px 10px; font-size: 0.85rem; width: 240px;
        }
        #customDomainInput:focus { outline: none; border-color: #ffcc55; }
        .base-url-badge {
            background: #0d1820; color: #4fa8ff; font-size: 0.78rem;
            padding: 4px 10px; border-radius: 20px; border: 1px solid #1e3550; white-space: nowrap;
            max-width: 320px; overflow: hidden; text-overflow: ellipsis;
        }

        /* ========== BODY LAYOUT ========== */
        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: var(--sidebar-w);
            min-width: 160px;
            max-width: 520px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar-resizer {
            width: 4px;
            background: #0d1820;
            cursor: col-resize;
            flex-shrink: 0;
            transition: background 0.15s;
            position: relative;
        }
        .sidebar-resizer:hover,
        .sidebar-resizer.dragging { background: var(--blue); }
        .sidebar-resizer::after {
            content: '';
            position: absolute;
            inset: 0 -4px;
        }
        .sidebar-search {
            padding: 12px;
            border-bottom: 1px solid #0d1820;
        }
        .sidebar-search input {
            width: 100%; background: #2a3a4f; border: 1px solid #3a4f6a;
            border-radius: 6px; color: #fff; padding: 7px 10px; font-size: 0.84rem;
        }
        .sidebar-search input:focus { outline: none; border-color: var(--blue); }
        .sidebar-search input::placeholder { color: var(--sidebar-muted); }
        .sidebar-list { overflow-y: auto; flex: 1; padding: 6px 0; }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: #3a4f6a; border-radius: 4px; }

        .api-group { }
        .api-group-header {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; cursor: pointer;
            color: var(--sidebar-muted); font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.6px;
            user-select: none;
        }
        .api-group-header:hover { color: #fff; }
        .api-group-header .chevron { margin-left: auto; transition: transform 0.2s; font-size: 0.7rem; }
        .api-group-header.collapsed .chevron { transform: rotate(-90deg); }
        .api-group-endpoints { }
        .api-group-endpoints.hidden { display: none; }

        .endpoint-item {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 14px 7px 20px; cursor: pointer;
            color: var(--sidebar-text); font-size: 0.84rem;
            border-left: 3px solid transparent;
            transition: background 0.15s;
        }
        .endpoint-item:hover { background: var(--sidebar-hover); }
        .endpoint-item.active { background: rgba(45, 123, 224, 0.15); border-left-color: var(--sidebar-selected); color: #fff; }
        .endpoint-item .ep-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ========== MAIN PANEL ========== */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* ========== AUTH PANEL ========== */
        .auth-panel {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .auth-panel-header {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 20px; cursor: pointer;
            font-size: 0.88rem; font-weight: 600; color: #4a5568;
            user-select: none;
        }
        .auth-panel-header:hover { color: #1a202c; }
        .auth-panel-header .auth-title { flex: 1; }
        .auth-panel-header .auth-status { font-size: 0.8rem; font-weight: 400; }
        .auth-panel-header .auth-status.has-token { color: #27ae60; }
        .auth-panel-header .auth-status.no-token { color: #e74c3c; }
        .auth-panel-body { padding: 0 20px 16px; display: none; }
        .auth-panel-body.open { display: block; }

        .auth-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 12px;
        }
        .auth-grid .span2 { grid-column: span 2; }
        .auth-field label { display: block; font-size: 0.78rem; font-weight: 600; color: #718096; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
        .auth-field input, .auth-field select {
            width: 100%; padding: 7px 10px; border: 1px solid var(--border);
            border-radius: 6px; font-size: 0.85rem; background: #fff; color: #1a202c;
        }
        .auth-field input:focus, .auth-field select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(45,123,224,0.1); }
        .auth-method-tabs { display: flex; gap: 8px; }
        .auth-method-tab {
            flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: 6px;
            background: #fff; font-size: 0.84rem; cursor: pointer; text-align: center;
            color: #718096; transition: all 0.15s;
        }
        .auth-method-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
        .auth-actions { display: flex; align-items: center; gap: 10px; }
        .btn-primary {
            background: var(--blue); color: #fff; border: none;
            padding: 8px 18px; border-radius: 6px; font-size: 0.88rem; font-weight: 600;
            cursor: pointer; transition: background 0.15s; white-space: nowrap;
        }
        .btn-primary:hover { background: var(--blue-dark); }
        .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
        .btn-secondary {
            background: #fff; color: #4a5568; border: 1px solid var(--border);
            padding: 8px 14px; border-radius: 6px; font-size: 0.84rem;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-secondary:hover { border-color: #a0aec0; background: #f7fafc; }
        .token-display {
            flex: 1; font-size: 0.78rem; color: #718096; background: #f7fafc;
            border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-family: monospace; cursor: pointer;
        }
        .token-display:hover { border-color: #a0aec0; }
        .token-display.has-token { color: #27ae60; }

        /* ========== REQUEST BUILDER ========== */
        .request-section {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            flex-shrink: 0;
        }
        .request-desc { font-size: 0.82rem; color: #718096; margin-bottom: 10px; font-style: italic; }
        .request-url-bar { display: flex; gap: 8px; align-items: center; }
        .method-badge-select {
            padding: 8px 12px; border-radius: 6px; border: 2px solid;
            font-size: 0.85rem; font-weight: 700; cursor: pointer; min-width: 90px;
            text-align: center; appearance: none; -webkit-appearance: none; background: transparent;
        }
        .method-get    { color: #27ae60; border-color: #27ae60; background: #f0fff4; }
        .method-post   { color: #2980b9; border-color: #2980b9; background: #ebf5fb; }
        .method-put    { color: #e67e22; border-color: #e67e22; background: #fef9ed; }
        .method-delete { color: #e74c3c; border-color: #e74c3c; background: #fdedec; }
        .method-patch  { color: #8e44ad; border-color: #8e44ad; background: #f5eef8; }
        .url-input {
            flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
            font-size: 0.9rem; font-family: 'SFMono-Regular', Consolas, monospace;
            color: #1a202c; background: #fff;
        }
        .url-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(45,123,224,0.1); }
        .btn-send {
            background: #ff6b35; color: #fff; border: none;
            padding: 8px 22px; border-radius: 6px; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: background 0.15s; white-space: nowrap;
        }
        .btn-send:hover { background: #e55a26; }

        /* ========== TABS ========== */
        .tabs-container { background: var(--white); flex-shrink: 0; border-bottom: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
        .h-resizer {
            height: 5px; background: var(--border); cursor: row-resize;
            flex-shrink: 0; transition: background 0.15s; position: relative;
        }
        .h-resizer:hover, .h-resizer.dragging { background: var(--blue); }
        .h-resizer::after { content: ''; position: absolute; inset: -4px 0; }
        .tabs-nav { display: flex; padding: 0 20px; gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .tab-btn {
            padding: 10px 16px; font-size: 0.85rem; color: #718096; cursor: pointer;
            border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-top: none;
            border-left: none; border-right: none; transition: all 0.15s; white-space: nowrap;
        }
        .tab-btn:hover { color: #1a202c; }
        .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
        .tab-btn .tab-badge {
            display: inline-block; background: #e2e8f0; color: #4a5568;
            font-size: 0.7rem; padding: 1px 6px; border-radius: 10px; margin-left: 5px;
        }
        .tab-btn.active .tab-badge { background: rgba(45,123,224,0.15); color: var(--blue); }
        .tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
        .tab-pane { display: none; }
        .tab-pane.active { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; min-height: 0; }
        .tab-pane.active::-webkit-scrollbar { width: 6px; }
        .tab-pane.active::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
        .tab-pane.active::-webkit-scrollbar-thumb:hover { background: #a0aec0; }

        /* ========== PARAMS / HEADERS TABLE ========== */
        .kv-table { width: 100%; border-collapse: collapse; }
        .kv-table th { font-size: 0.75rem; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.4px; padding: 0 8px 8px; text-align: left; }
        .kv-table td { padding: 4px; vertical-align: middle; }
        .kv-table .col-check { width: 30px; }
        .kv-table .col-type  { width: 70px; }
        .kv-table .col-key   { width: 30%; }
        .kv-table .col-value { width: auto; }
        .kv-table .col-action { width: 32px; }
        .kv-input {
            width: 100%; padding: 5px 8px; border: 1px solid var(--border);
            border-radius: 4px; font-size: 0.84rem; background: #fff;
        }
        .kv-input:focus { outline: none; border-color: var(--blue); }
        .kv-input[readonly] { background: #f7fafc; color: #718096; }
        .type-badge {
            display: inline-block; font-size: 0.68rem; font-weight: 700; padding: 2px 6px;
            border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px;
        }
        .type-path  { background: #fef9ed; color: #e67e22; border: 1px solid #fad7a0; }
        .type-query { background: #ebf5fb; color: #2980b9; border: 1px solid #aed6f1; }
        .type-header-badge { background: #f5eef8; color: #8e44ad; border: 1px solid #d7bde2; }
        .btn-icon { background: none; border: none; cursor: pointer; color: #a0aec0; padding: 4px 6px; border-radius: 4px; font-size: 0.85rem; }
        .btn-icon:hover { color: #e74c3c; background: #fee; }
        .btn-add-row { background: none; border: 1px dashed var(--border); color: #718096; font-size: 0.82rem; padding: 5px 12px; border-radius: 4px; cursor: pointer; margin-top: 6px; }
        .btn-add-row:hover { border-color: var(--blue); color: var(--blue); }
        .required-star { color: #e74c3c; margin-left: 2px; }
        .param-desc { font-size: 0.75rem; color: #a0aec0; margin-top: 1px; }

        /* ========== BODY EDITOR ========== */
        .body-editor {
            flex: 1; width: 100%; min-height: 60px; font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.84rem; border: 1px solid var(--border); border-radius: 6px;
            padding: 10px; resize: none; color: #1a202c; line-height: 1.5; box-sizing: border-box;
        }
        .body-editor:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(45,123,224,0.1); }
        .body-toolbar { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; flex-shrink: 0; }
        .body-toolbar span { font-size: 0.8rem; color: #718096; flex: 1; }

        /* ========== RESPONSE PANEL ========== */
        .response-section {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
            background: var(--white);
        }
        .response-header {
            padding: 10px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .response-title { font-size: 0.85rem; font-weight: 600; color: #4a5568; }
        .status-badge {
            padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 700;
        }
        .status-2xx { background: #d5f5e3; color: #1e8449; }
        .status-3xx { background: #fef9e7; color: #d4ac0d; }
        .status-4xx { background: #fadbd8; color: #c0392b; }
        .status-5xx { background: #fadbd8; color: #c0392b; }
        .response-meta { font-size: 0.78rem; color: #a0aec0; display: flex; gap: 12px; }
        .response-meta span { display: flex; align-items: center; gap: 4px; }
        .response-actions { margin-left: auto; display: flex; gap: 6px; }
        .response-body-wrap { flex: 1; overflow-y: auto; position: relative; min-height: 0; }
        .response-body-wrap::-webkit-scrollbar { width: 6px; }
        .response-body-wrap::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
        .response-body-wrap::-webkit-scrollbar-thumb:hover { background: #a0aec0; }
        .response-pre {
            margin: 0; padding: 16px 20px;
            font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.83rem;
            line-height: 1.6; white-space: pre-wrap; word-break: break-all;
            background: #fff;
        }
        .response-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: #a0aec0; gap: 10px;
        }
        .response-placeholder i { font-size: 2.5rem; }
        .response-placeholder p { font-size: 0.9rem; }

        /* JSON syntax coloring */
        .json-key    { color: #c0392b; }
        .json-string { color: #27ae60; }
        .json-number { color: #2980b9; }
        .json-bool   { color: #8e44ad; font-weight: bold; }
        .json-null   { color: #95a5a6; font-style: italic; }

        /* OPA badge */
        .opa-code {
            font-size: 0.68rem; font-weight: 700; font-family: 'SFMono-Regular', Consolas, monospace;
            color: #c9d4df; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            padding: 1px 5px; border-radius: 3px; white-space: nowrap; flex-shrink: 0;
        }
        .endpoint-item.active .opa-code { color: #fff; background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }

        /* ========== METHOD BADGE (inline) ========== */
        .m-badge {
            display: inline-block; font-size: 0.68rem; font-weight: 800; padding: 2px 6px;
            border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; width: 52px; text-align: center;
        }
        .m-get    { background: #f0fff4; color: #27ae60; border: 1px solid #a9dfbf; }
        .m-post   { background: #ebf5fb; color: #2980b9; border: 1px solid #aed6f1; }
        .m-put    { background: #fef9ed; color: #e67e22; border: 1px solid #fad7a0; }
        .m-delete { background: #fdedec; color: #e74c3c; border: 1px solid #fadbd8; }
        .m-patch  { background: #f5eef8; color: #8e44ad; border: 1px solid #d7bde2; }

        /* ========== MISC ========== */
        .empty-select { padding: 40px; text-align: center; color: #a0aec0; }
        .empty-select i { font-size: 2rem; margin-bottom: 10px; display: block; }
        .empty-select p { font-size: 0.9rem; }

        .toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 1000;
            background: #1e2a38; color: #fff; padding: 10px 18px; border-radius: 8px;
            font-size: 0.85rem; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
    <div class="logo">eformsign <span>API Tester</span></div>
    <div class="env-select-wrap">
        <label for="envSelect">환경:</label>
        <select id="envSelect">
            <option value="op_saas">운영 (SaaS)</option>
            <option value="csap">공공 (CSAP)</option>
            <option value="custom">직접 입력</option>
        </select>
        <div id="customDomainWrap">
            <input type="text" id="customDomainInput" placeholder="https://api.example.com">
        </div>
        <div class="base-url-badge" id="baseUrlBadge"></div>
    </div>
</header>

<div class="app-body">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-search">
            <input type="text" id="sidebarSearch" placeholder="&#xf002; API 검색...">
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
    </aside>
    <div class="sidebar-resizer" id="sidebarResizer"></div>

    <!-- MAIN -->
    <main class="main">

        <!-- AUTH PANEL -->
        <div class="auth-panel">
            <div class="auth-panel-header" id="authPanelToggle">
                <i class="fa-solid fa-key fa-sm" style="color:#e6a817"></i>
                <span class="auth-title">인증 설정 (Access Token)</span>
                <span class="auth-status no-token" id="authStatusBadge">토큰 없음</span>
                <i class="fa-solid fa-chevron-down fa-xs" id="authChevron" style="color:#a0aec0;transition:transform 0.2s"></i>
            </div>
            <div class="auth-panel-body" id="authPanelBody">
                <div class="auth-grid">
                    <div class="auth-field">
                        <label>API Key</label>
                        <input type="text" id="apiKey" placeholder="API Key 입력">
                    </div>
                    <div class="auth-field">
                        <label>User ID (member_id)</label>
                        <input type="text" id="userId" placeholder="User ID 입력">
                    </div>
                    <div class="auth-field span2">
                        <label>인증 방식</label>
                        <div class="auth-method-tabs">
                            <button class="auth-method-tab active" data-method="signature">Signature 방식 (비밀키 Hex)</button>
                            <button class="auth-method-tab" data-method="bearer">Bearer Token 방식</button>
                        </div>
                    </div>
                    <div class="auth-field span2">
                        <label id="secretKeyLabel">비밀 키 (Secret Key, Hex)</label>
                        <input type="password" id="secretKey" placeholder="비밀 키 입력 (Hex 형식)">
                    </div>
                </div>
                <div class="auth-actions">
                    <button class="btn-primary" id="btnGetToken"><i class="fa-solid fa-rotate fa-sm"></i> 토큰 발급</button>
                    <button class="btn-secondary" id="btnClearToken"><i class="fa-solid fa-xmark fa-sm"></i> 초기화</button>
                    <div class="token-display" id="tokenDisplay" title="클릭하여 복사">토큰을 발급받아 주세요</div>
                </div>
            </div>
        </div>

        <!-- REQUEST SECTION -->
        <div id="emptyState" class="empty-select">
            <i class="fa-solid fa-arrow-left-long"></i>
            <p>왼쪽 목록에서 API를 선택하세요</p>
        </div>

        <div id="requestArea" style="display:none; flex:1; display:none; flex-direction:column; overflow:hidden;">

            <div class="request-section">
                <div class="request-desc" id="requestDesc"></div>
                <div class="request-url-bar">
                    <select class="method-badge-select" id="methodSelect" onchange="updateMethodStyle()">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="PATCH">PATCH</option>

<script>
// ──────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ──────────────────────────────────────────────────────────────────────────
const DOMAINS = {
    op_saas: 'https://kr-api.eformsign.com',
    csap: 'https://www.gov-eformsign.com/Service'
};

// ──────────────────────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────────────────────
let state = {
    accessToken: '',
    authMethod: 'signature',   // 'signature' | 'bearer'
    currentEndpoint: null,
};

// 엔드포인트별 응답 캐시 { [endpointId]: { statusText, statusClass, time, size, bodyHtml } }
const responseCache = {};

function saveResponseState(epId) {
    if (!epId || !$('#responseBody').is(':visible')) return;
    responseCache[epId] = {
        statusText:  $('#statusBadge').text(),
        statusClass: $('#statusBadge').attr('class'),
        time:        $('#responseTime').text(),
        size:        $('#responseSize').text(),
        bodyHtml:    $('#responseBody').html(),
    };
}

function restoreResponseState(epId) {
    const cached = responseCache[epId];
    if (cached) {
        $('#statusBadge').text(cached.statusText).attr('class', cached.statusClass).show();
        $('#responseTime').text(cached.time);
        $('#responseSize').text(cached.size);
        $('#responseMeta').show();
        $('#responseBody').html(cached.bodyHtml).show();
        $('#responsePlaceholder').hide();
        $('#btnCopyResponse').show();
        $('#btnClearResponse').show();
    } else {
        clearResponse();
    }
}

// ──────────────────────────────────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────────────────────────────────
function getBaseUrl() {
    const env = $('#envSelect').val();
    if (env === 'custom') {
        return $('#customDomainInput').val().trim().replace(/\/+$/, '');
    }
    return DOMAINS[env] || '';
}

function methodClass(method) {
    return 'm-' + (method || 'get').toLowerCase();
}

function methodBadge(method) {
    return `<span class="m-badge ${methodClass(method)}">${method}</span>`;
}

function showToast(msg, duration = 2000) {
    const $t = $('#toast');
    $t.text(msg).addClass('show');
    setTimeout(() => $t.removeClass('show'), duration);
}

function formatJsonSyntax(json) {
    if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
    return json
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/("(?:[^"\\]|\\.)*")(\s*:)/g, '<span class="json-key">$1</span>$2')
        .replace(/:\s*("(?:[^"\\]|\\.)*")/g, ': <span class="json-string">$1</span>')
        .replace(/:\s*(-?\d+\.?\d*(?:[eE][+-]?\d+)?)/g, ': <span class="json-number">$1</span>')
        .replace(/:\s*(true|false)/g, ': <span class="json-bool">$1</span>')
        .replace(/:\s*(null)/g, ': <span class="json-null">$1</span>');
}

// ──────────────────────────────────────────────────────────────────────────
// SIDEBAR
// ──────────────────────────────────────────────────────────────────────────
function buildSidebar(filter = '') {
    const $list = $('#sidebarList').empty();
    const groups = {};
    API_LIST.forEach(ep => {
        if (!groups[ep.group]) groups[ep.group] = { icon: ep.groupIcon, items: [] };
        groups[ep.group].items.push(ep);
    });

    Object.entries(groups).forEach(([groupName, { icon, items }]) => {
        const filtered = filter
            ? items.filter(ep => ep.name.toLowerCase().includes(filter.toLowerCase()) || ep.path.toLowerCase().includes(filter.toLowerCase()))
            : items;
        if (!filtered.length) return;

        const groupId = 'group-' + groupName.replace(/\s+/g, '-');
        const $group = $('<div class="api-group">');
        const $header = $(`
            <div class="api-group-header" data-group="${groupId}">
                <i class="fa-solid ${icon} fa-xs"></i>
                ${groupName}
                <i class="fa-solid fa-chevron-down chevron fa-xs"></i>
            </div>`);
        const $endpoints = $(`<div class="api-group-endpoints" id="${groupId}">`);

        filtered.forEach(ep => {
            const opaBadge = ep.opaCode
                ? `<span class="opa-code">${ep.opaCode}</span>`
                : '';
            const $item = $(`
                <div class="endpoint-item" data-id="${ep.id}">
                    ${methodBadge(ep.method)}
                    ${opaBadge}
                    <span class="ep-name">${ep.name}</span>
                </div>`);
            $item.on('click', () => selectEndpoint(ep.id));
            $endpoints.append($item);
        });

        $header.on('click', function() {
            $(this).toggleClass('collapsed');
            $endpoints.toggleClass('hidden');
        });

        $group.append($header, $endpoints);
        $list.append($group);
    });
}

function selectEndpoint(id) {
    const ep = API_LIST.find(e => e.id === id);
    if (!ep) return;

    // 이전 엔드포인트 응답 저장
    if (state.currentEndpoint) {
        saveResponseState(state.currentEndpoint.id);
    }

    state.currentEndpoint = ep;

    // Sidebar highlight
    $('.endpoint-item').removeClass('active');
    $(`.endpoint-item[data-id="${id}"]`).addClass('active');

    // Show request area
    $('#emptyState').hide();
    $('#requestArea').css('display', 'flex');

    // Method & URL
    $('#methodSelect').val(ep.method);
    updateMethodStyle();
    $('#requestDesc').text(ep.description || '');

    // Build params table first, then update URL (order matters)
    buildParamsTable(ep);
    updateUrlPreview();

    // Default body
    if (ep.defaultBody && ['POST','PUT','PATCH'].includes(ep.method)) {
        $('#bodyEditor').val(JSON.stringify(ep.defaultBody, null, 2));
        $('[data-tab="body"]').click();
    } else {
        $('#bodyEditor').val('');
    }

    // Headers (auto-set Authorization if requiresAuth)
    buildHeadersTable(ep);

    updateParamsBadge();
    updateHeadersBadge();

    // 현재 엔드포인트 응답 복원 (없으면 초기화)
    $('#exampleResponsePanel').hide();
    restoreResponseState(ep.id);
    updateExampleResponseBtn(ep);
}

// ──────────────────────────────────────────────────────────────────────────
// URL PREVIEW
// ──────────────────────────────────────────────────────────────────────────
function updateUrlPreview() {
    const ep = state.currentEndpoint;
    if (!ep) return;
    const base = getBaseUrl();
    let path = ep.path;

    // Fill path params from input values
    $('#paramsBody tr[data-type="path"]').each(function() {
        const key = $(this).find('.param-key').val();
        const val = $(this).find('.param-val').val();
        if (val) path = path.replace(`{${key}}`, val);
    });

    // Build query string from checked query params
    const qp = [];
    $('#paramsBody tr[data-type="query"]').each(function() {
        const enabled = $(this).find('.param-enabled').is(':checked');
        const key = $(this).find('.param-key').val();
        const val = $(this).find('.param-val').val();
        if (enabled && key && val) qp.push(`${encodeURIComponent(key)}=${encodeURIComponent(val)}`);
    });

    let url = base + path;
    if (qp.length) url += '?' + qp.join('&');
    $('#urlInput').val(url);
}

// ──────────────────────────────────────────────────────────────────────────
// PARAMS TABLE
// ──────────────────────────────────────────────────────────────────────────
function buildParamsTable(ep) {
    const $tbody = $('#paramsBody').empty();

    // Path params
    (ep.pathParams || []).forEach(p => {
        $tbody.append(makeParamRow('path', p.key, p.default || '', p.description, p.required, false));
    });

    // Query params
    (ep.queryParams || []).forEach(p => {
        $tbody.append(makeParamRow('query', p.key, p.default || '', p.description, p.required, true));
    });
}

function makeParamRow(type, key = '', value = '', desc = '', required = false, enabled = true, userAdded = false) {
    const typeBadge = type === 'path'
        ? '<span class="type-badge type-path">Path</span>'
        : '<span class="type-badge type-query">Query</span>';
    const readonlyKey = !userAdded ? 'readonly' : '';
    const disabledCheck = type === 'path' ? 'disabled checked' : (enabled ? 'checked' : '');
    const keyField = type === 'path'
        ? `<input class="kv-input param-key" value="${key}" ${readonlyKey}>`
        : `<input class="kv-input param-key" value="${key}" placeholder="키">`;
    const deleteBtn = userAdded ? `<button class="btn-icon" onclick="removeRow(this)" title="삭제"><i class="fa-solid fa-xmark"></i></button>` : '';

    const $tr = $(`<tr data-type="${type}" data-user-added="${userAdded}">
        <td class="col-check"><input type="checkbox" class="param-enabled" ${disabledCheck}></td>
        <td class="col-type">${typeBadge}</td>
        <td class="col-key">
            ${keyField}
            ${desc ? `<div class="param-desc">${desc}${required ? '<span class="required-star">*</span>' : ''}</div>` : ''}
        </td>
        <td class="col-value"><input class="kv-input param-val" value="${value}" placeholder="값"></td>
        <td class="col-action">${deleteBtn}</td>
    </tr>`);

    $tr.find('.param-val, .param-key').on('input', () => { updateUrlPreview(); updateParamsBadge(); });
    $tr.find('.param-enabled').on('change', () => { updateUrlPreview(); updateParamsBadge(); });
    return $tr;
}

function addQueryRow() {
    const $tbody = $('#paramsBody');
    $tbody.append(makeParamRow('query', '', '', '', false, true, true));
    updateParamsBadge();
}

function removeRow(btn) {
    $(btn).closest('tr').remove();
    updateUrlPreview();
    updateParamsBadge();
}

function updateParamsBadge() {
    let count = 0;
    $('#paramsBody tr[data-type="path"]').each(function() {
        if ($(this).find('.param-val').val()) count++;
    });
    $('#paramsBody tr[data-type="query"]').each(function() {
        if ($(this).find('.param-enabled').is(':checked') && $(this).find('.param-key').val()) count++;
    });
    $('#paramsBadge').text(count);
}

// ──────────────────────────────────────────────────────────────────────────
// HEADERS TABLE
// ──────────────────────────────────────────────────────────────────────────
function buildHeadersTable(ep) {
    const $tbody = $('#headersBody').empty();
    // Always add Content-Type
    $tbody.append(makeHeaderRow('Content-Type', 'application/json', false));
    // API별 defaultHeaders (e.g. OPA2_001)
    if (ep && ep.defaultHeaders) {
        ep.defaultHeaders.forEach(h => {
            const val = h.autoFill ? h.autoFill() : (h.value || '');
            $tbody.append(makeHeaderRow(h.key, val, false, h.description));
        });
    }
    // Add Authorization if required
    if (ep && ep.requiresAuth) {
        const token = state.accessToken ? `Bearer ${state.accessToken}` : '';
        $tbody.append(makeHeaderRow('Authorization', token, false));
    }
    updateHeadersBadge();
}

function makeHeaderRow(key = '', value = '', userAdded = true, description = '') {
    const readonlyKey = !userAdded ? 'readonly' : '';
    const deleteBtn = userAdded ? `<button class="btn-icon" onclick="removeRow(this)" title="삭제"><i class="fa-solid fa-xmark"></i></button>` : '';
    const descHtml = description ? `<div class="param-desc">${description}</div>` : '';
    const $tr = $(`<tr data-user-added="${userAdded}">
        <td class="col-check"><input type="checkbox" class="header-enabled" checked></td>
        <td class="col-key">
            <input class="kv-input header-key" value="${key}" ${readonlyKey} placeholder="키">
            ${descHtml}
        </td>
        <td class="col-value"><input class="kv-input header-val" value="${value}" placeholder="값"></td>
        <td class="col-action">${deleteBtn}</td>
    </tr>`);
    $tr.find('.header-val, .header-key').on('input', updateHeadersBadge);
    $tr.find('.header-enabled').on('change', updateHeadersBadge);
    return $tr;
}

function addHeaderRow() {
    $('#headersBody').append(makeHeaderRow());
    updateHeadersBadge();
}

function updateHeadersBadge() {
    let count = 0;
    $('#headersBody tr').each(function() {
        if ($(this).find('.header-enabled').is(':checked') && $(this).find('.header-key').val()) count++;
    });
    $('#headersBadge').text(count);
}

// ──────────────────────────────────────────────────────────────────────────
// BODY EDITOR
// ──────────────────────────────────────────────────────────────────────────
function formatBody() {
    const raw = $('#bodyEditor').val().trim();
    if (!raw) return;
    try {
        $('#bodyEditor').val(JSON.stringify(JSON.parse(raw), null, 2));
    } catch { showToast('JSON 형식이 올바르지 않습니다', 2000); }
}

function clearBody() {
    $('#bodyEditor').val('');
}

// ──────────────────────────────────────────────────────────────────────────
// METHOD STYLE
// ──────────────────────────────────────────────────────────────────────────
function updateMethodStyle() {
    const m = $('#methodSelect').val().toLowerCase();
    const el = $('#methodSelect')[0];
    el.className = 'method-badge-select method-' + m;
}

// ──────────────────────────────────────────────────────────────────────────
// AUTH
// ──────────────────────────────────────────────────────────────────────────
async function getAccessToken() {
    const execTime = Date.now();
    const apiKey = $('#apiKey').val().trim();
    const secretKey = $('#secretKey').val().trim();
    const memberId = $('#userId').val().trim();
    const domain = getBaseUrl();

    if (!domain) { showToast('환경을 선택하거나 도메인을 입력해주세요'); return; }
    if (!apiKey || !secretKey || !memberId) { showToast('API Key, 비밀 키, User ID를 모두 입력해주세요'); return; }

    $('#btnGetToken').prop('disabled', true).html('<i class="fa-solid fa-spinner fa-spin fa-sm"></i> 발급 중...');

    let signature;
    if (state.authMethod === 'signature') {
        try {
            const keyObj = KEYUTIL.getKeyFromPlainPrivatePKCS8Hex(secretKey);
            const sig = new KJUR.crypto.Signature({ alg: 'SHA256withECDSA' });
            sig.init(keyObj);
            sig.updateString(execTime.toString());
            signature = sig.sign();
        } catch (e) {
            showToast('서명 생성 오류: ' + e.message, 3000);
            $('#btnGetToken').prop('disabled', false).html('<i class="fa-solid fa-rotate fa-sm"></i> 토큰 발급');
            return;
        }
    } else {
        signature = 'Bearer ' + secretKey;
    }

    const url = `${domain}/v2.0/api_auth/access_token`;
    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json; charset=UTF-8',
                'Authorization': 'Bearer ' + btoa(apiKey),
                'eformsign_signature': signature
            },
            body: JSON.stringify({ execution_time: execTime, member_id: memberId })
        });
        const data = await res.json();
        if (data.oauth_token && data.oauth_token.access_token) {
            state.accessToken = data.oauth_token.access_token;
            updateAuthUI();
            // Auto-update Authorization header in current request if open
            $('#headersBody tr').each(function() {
                const key = $(this).find('.header-key').val();
                if (key === 'Authorization') {
                    $(this).find('.header-val').val(`Bearer ${state.accessToken}`);
                }
            });
            showToast('토큰이 발급되었습니다');
        } else {
            showToast('토큰 발급 실패: ' + JSON.stringify(data), 3000);
        }
    } catch (e) {
        showToast('요청 오류: ' + e.message, 3000);
    }
    $('#btnGetToken').prop('disabled', false).html('<i class="fa-solid fa-rotate fa-sm"></i> 토큰 발급');
}

function updateAuthUI() {
    if (state.accessToken) {
        const short = state.accessToken.substring(0, 40) + '...';
        $('#tokenDisplay').text(short).addClass('has-token');
        $('#authStatusBadge').text('토큰 보유').removeClass('no-token').addClass('has-token');
    } else {
        $('#tokenDisplay').text('토큰을 발급받아 주세요').removeClass('has-token');
        $('#authStatusBadge').text('토큰 없음').removeClass('has-token').addClass('no-token');
    }
}

// ──────────────────────────────────────────────────────────────────────────
// SEND REQUEST
// ──────────────────────────────────────────────────────────────────────────
async function sendRequest() {
    const url = $('#urlInput').val().trim();
    const method = $('#methodSelect').val();
    if (!url) { showToast('URL이 비어있습니다'); return; }

    // Build headers
    const headers = {};
    $('#headersBody tr').each(function() {
        if ($(this).find('.header-enabled').is(':checked')) {
            const k = $(this).find('.header-key').val().trim();
            const v = $(this).find('.header-val').val().trim();
            if (k) headers[k] = v;
        }
    });

    // Build body
    let body = undefined;
    if (['POST', 'PUT', 'PATCH'].includes(method)) {
        const raw = $('#bodyEditor').val().trim();
        if (raw) {
            try { body = raw; JSON.parse(raw); } // validate
            catch { showToast('Body의 JSON 형식이 올바르지 않습니다'); return; }
        }
    }

    $('#btnSend').prop('disabled', true).html('<i class="fa-solid fa-spinner fa-spin fa-sm"></i>');
    clearResponse();
    $('#responsePlaceholder').show().find('p').text('요청 전송 중...');

    const startTime = Date.now();
    try {
        const opts = { method, headers };
        if (body !== undefined) opts.body = body;

        const res = await fetch(url, opts);
        const elapsed = Date.now() - startTime;
        const text = await res.text();

        let parsed;
        try { parsed = JSON.parse(text); } catch { parsed = null; }

        // Status badge
        const statusClass = res.status >= 500 ? 'status-5xx'
            : res.status >= 400 ? 'status-4xx'
            : res.status >= 300 ? 'status-3xx' : 'status-2xx';
        $('#statusBadge').text(`${res.status} ${res.statusText}`).attr('class', `status-badge ${statusClass}`).show();
        $('#responseMeta').show();
        $('#responseTime').text(`${elapsed}ms`);
        $('#responseSize').text(formatBytes(text.length));
        $('#btnCopyResponse').show();
        $('#btnClearResponse').show();
        $('#responsePlaceholder').hide();

        // Render response
        const $pre = $('#responseBody').show();
        if (parsed !== null) {
            $pre.html(formatJsonSyntax(JSON.stringify(parsed, null, 2)));
        } else {
            $pre.text(text || '(응답 없음)');
        }

    } catch (e) {
        $('#responsePlaceholder').show().find('p').text('요청 실패: ' + e.message);
        showToast('요청 실패: ' + e.message, 3000);
    }

    $('#btnSend').prop('disabled', false).html('<i class="fa-solid fa-paper-plane fa-sm"></i> Send');
}

function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

// ──────────────────────────────────────────────────────────────────────────
// RESPONSE UTILITIES
// ──────────────────────────────────────────────────────────────────────────
function copyResponse() {
    const text = $('#responseBody').text();
    navigator.clipboard.writeText(text).then(() => showToast('응답이 복사되었습니다'));
}

function clearResponse() {
    $('#statusBadge').hide();
    $('#responseMeta').hide();
    $('#btnCopyResponse').hide();
    $('#btnClearResponse').hide();
    $('#responseBody').hide().html('');
    $('#exampleResponsePanel').hide();
    $('#responsePlaceholder').show().find('p').text('요청을 보내면 응답이 여기에 표시됩니다');
    if (state.currentEndpoint) {
        delete responseCache[state.currentEndpoint.id];
    }
}

function toggleExampleResponse() {
    const $panel = $('#exampleResponsePanel');
    const $placeholder = $('#responsePlaceholder');
    const $body = $('#responseBody');

    if ($panel.is(':visible')) {
        $panel.hide();
        if (!$body.is(':visible')) $placeholder.show();
    } else {
        $placeholder.hide();
        $panel.show();
    }
}

function updateExampleResponseBtn(ep) {
    if (ep && ep.exampleResponse) {
        const ex = ep.exampleResponse;
        let html = '';

        if (ex.success) {
            html += `
                <div style="padding:6px 20px;background:#f0fdf4;border-bottom:1px solid #bbf7d0;font-size:0.78rem;font-weight:700;color:#15803d;display:flex;align-items:center;gap:5px;">
                    <i class="fa-solid fa-circle-check fa-xs"></i> 성공 응답 (200)
                </div>
                <pre class="response-pre">${formatJsonSyntax(JSON.stringify(ex.success, null, 2))}</pre>`;
        }

        if (ex.errors && ex.errors.length) {
            ex.errors.forEach(err => {
                html += `
                    <div style="padding:6px 20px;background:#fef2f2;border-top:1px solid #fecaca;border-bottom:1px solid #fecaca;font-size:0.78rem;font-weight:700;color:#b91c1c;display:flex;align-items:center;gap:5px;">
                        <i class="fa-solid fa-circle-xmark fa-xs"></i> 실패 응답 — ${err.title}
                    </div>
                    <pre class="response-pre">${formatJsonSyntax(JSON.stringify(err.body, null, 2))}</pre>`;
            });
        }

        $('#exampleResponseBody').html(html);
        $('#btnExampleResponse').show();
    } else {
        $('#btnExampleResponse').hide();
        $('#exampleResponsePanel').hide();
    }
}

// ──────────────────────────────────────────────────────────────────────────
// TABS
// ──────────────────────────────────────────────────────────────────────────
$(document).on('click', '.tab-btn', function() {
    const tab = $(this).data('tab');
    $('.tab-btn').removeClass('active');
    $(this).addClass('active');
    $('.tab-pane').removeClass('active');
    $(`#tab-${tab}`).addClass('active');

// ──────────────────────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────────────────────
$(document).ready(function() {
    buildSidebar();
    updateBaseUrlBadge();

    // Auth panel toggle
    $('#authPanelToggle').on('click', function() {
        $('#authPanelBody').toggleClass('open');
        const isOpen = $('#authPanelBody').hasClass('open');
        $('#authChevron').css('transform', isOpen ? 'rotate(180deg)' : '');
    });

    // Auth method tabs
    $('.auth-method-tab').on('click', function() {
        state.authMethod = $(this).data('method');
        $('.auth-method-tab').removeClass('active');
        $(this).addClass('active');
        if (state.authMethod === 'signature') {
            $('#secretKeyLabel').text('비밀 키 (Secret Key, Hex)');
            $('#secretKey').attr('placeholder', '비밀 키 입력 (Hex 형식)');
        } else {
            $('#secretKeyLabel').text('Bearer 토큰');
            $('#secretKey').attr('placeholder', 'Bearer 토큰 값 입력');
        }
    });

    // Get token button
    $('#btnGetToken').on('click', getAccessToken);

    // Clear token
    $('#btnClearToken').on('click', function() {
        state.accessToken = '';
        updateAuthUI();
        $('#headersBody tr').each(function() {
            if ($(this).find('.header-key').val() === 'Authorization') {
                $(this).find('.header-val').val('');
            }
        });
        showToast('토큰이 초기화되었습니다');
    });

    // Copy token
    $('#tokenDisplay').on('click', function() {
        if (!state.accessToken) return;
        navigator.clipboard.writeText(state.accessToken).then(() => showToast('토큰이 복사되었습니다'));
    });

    // Env change
    $('#envSelect').on('change', function() {
        const v = $(this).val();
        $('#customDomainWrap').toggle(v === 'custom');
        updateBaseUrlBadge();
        updateUrlPreview();
    });
    $('#customDomainInput').on('input', function() {
        updateBaseUrlBadge();
        updateUrlPreview();
    });

    // Sidebar search
    $('#sidebarSearch').on('input', function() {
        buildSidebar($(this).val());
    });
});

// ──────────────────────────────────────────────────────────────────────────
// HORIZONTAL RESIZER (Request ↕ Response)
// ──────────────────────────────────────────────────────────────────────────
(function() {
    const hResizer = document.getElementById('hResizer');
    const tabsContainer = document.getElementById('tabsContainer');

    hResizer.addEventListener('mousedown', function(e) {
        e.preventDefault();
        const startY = e.clientY;
        const startH = tabsContainer.offsetHeight;
        hResizer.classList.add('dragging');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';

        function onMouseMove(e) {
            const newH = Math.max(80, Math.min(600, startH + e.clientY - startY));
            tabsContainer.style.height = newH + 'px';
        }

        function onMouseUp() {
            hResizer.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
    });
})();

// ──────────────────────────────────────────────────────────────────────────
// SIDEBAR RESIZE
// ──────────────────────────────────────────────────────────────────────────
(function() {
    const resizer = document.getElementById('sidebarResizer');
    const sidebar = document.getElementById('sidebar');
    let startX, startW;

    resizer.addEventListener('mousedown', function(e) {
        startX = e.clientX;
        startW = sidebar.offsetWidth;
        resizer.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';

        function onMouseMove(e) {
            const delta = e.clientX - startX;
            const newW = Math.min(520, Math.max(160, startW + delta));
            sidebar.style.width = newW + 'px';
        }

        function onMouseUp() {
            resizer.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
    });
})();

function updateBaseUrlBadge() {
    const url = getBaseUrl();
    $('#baseUrlBadge').text(url || '(도메인 미지정)');
}
