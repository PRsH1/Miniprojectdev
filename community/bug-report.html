<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>버그 리포트</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #111827;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(248,113,113,.14), transparent 28%),
        linear-gradient(180deg, #fff9f5 0%, #f8fafc 100%);
    }
    .shell {
      width: min(900px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 60px 0 80px;
    }
    .hero {
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4.5vw, 40px);
      letter-spacing: -.04em;
    }
    .hero p {
      margin: 0;
      max-width: 700px;
      line-height: 1.7;
      color: #4b5563;
    }
    .panel {
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(251, 146, 60, .18);
      border-radius: 28px;
      box-shadow: 0 22px 54px rgba(15, 23, 42, .08);
      padding: 28px;
      backdrop-filter: blur(10px);
    }
    .gate,
    .success-box {
      display: none;
    }
    .gate.active,
    .success-box.active {
      display: block;
    }
    .gate {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 22px;
      padding: 24px;
      color: #9a3412;
    }
    .gate h2,
    .success-box h2 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    .gate p,
    .success-box p {
      margin: 0;
      line-height: 1.7;
    }
    .form-shell.hidden {
      display: none;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }
    label {
      font-size: 13px;
      font-weight: 700;
      color: #374151;
    }
    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid #fed7aa;
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      color: #111827;
      background: #fffaf7;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input[type="text"]:focus,
    textarea:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 4px rgba(249, 115, 22, .12);
    }
    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.65;
    }
    .severity-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .severity-option {
      position: relative;
    }
    .severity-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .severity-option span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      padding: 11px 16px;
      border-radius: 999px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #9a3412;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, background-color .15s ease, color .15s ease;
    }
    .severity-option input:checked + span {
      background: linear-gradient(135deg, #ea580c, #fb923c);
      color: #fff;
      border-color: transparent;
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(249, 115, 22, .18);
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #ea580c, #fb923c);
      color: #fff;
      box-shadow: 0 14px 28px rgba(249, 115, 22, .2);
    }
    .btn:disabled {
      opacity: .7;
      cursor: wait;
    }
    .btn-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 11px 18px;
      margin-top: 18px;
      background: #ea580c;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
    .meta {
      margin-bottom: 22px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 14px;
    }
    .status-msg {
      min-height: 20px;
      margin-top: 6px;
      font-size: 13px;
      color: #dc2626;
    }
    .success-box {
      border-radius: 22px;
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      padding: 24px;
      color: #166534;
    }
    @media (max-width: 680px) {
      .shell { width: min(100vw - 24px, 900px); padding-top: 34px; }
      .panel { padding: 20px; }
      .severity-group { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .severity-option span { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>버그 리포트</h1>
      <p>재현 가능한 문제를 제보해 주세요. 로그인 사용자만 제출할 수 있으며, 접수 즉시 관리자에게 알림이 전달됩니다.</p>
    </section>

    <section class="panel">
      <div class="gate" id="loginGate">
        <h2>로그인 후 제보할 수 있습니다</h2>
        <p>운영 부하와 스팸을 줄이기 위해 로그인 사용자만 버그 리포트를 제출할 수 있습니다.</p>
        <a class="btn-link" id="loginLink" href="/auth/login.html?next=%2Fcommunity%2Fbug-report.html">로그인하러 가기</a>
      </div>

      <div class="form-shell hidden" id="reportShell">
        <div class="meta" id="reporterMeta"></div>
        <form id="bugReportForm">
          <div class="field">
            <label for="reportTitle">제목 *</label>
            <input type="text" id="reportTitle" maxlength="256" placeholder="예: 관리자 콘솔 저장 버튼이 동작하지 않습니다">
          </div>

          <div class="field">
            <label for="reportDescription">설명 *</label>
            <textarea id="reportDescription" placeholder="재현 절차, 기대 결과, 실제 결과를 함께 적어 주세요."></textarea>
          </div>

          <div class="field">
            <label for="reportPageUrl">발생 페이지</label>
            <input type="text" id="reportPageUrl" maxlength="512" placeholder="예: /app/admin?tab=users">
          </div>

          <div class="field">
            <label>심각도</label>
            <div class="severity-group">
              <label class="severity-option">
                <input type="radio" name="severity" value="low">
                <span>낮음</span>
              </label>
              <label class="severity-option">
                <input type="radio" name="severity" value="normal" checked>
                <span>보통</span>
              </label>
              <label class="severity-option">
                <input type="radio" name="severity" value="high">
                <span>높음</span>
              </label>
              <label class="severity-option">
                <input type="radio" name="severity" value="critical">
                <span>긴급</span>
              </label>
            </div>
          </div>

          <div class="status-msg" id="formMessage"></div>
          <div class="actions">
            <button type="submit" class="btn" id="submitButton">제출</button>
          </div>
        </form>
      </div>

      <div class="success-box" id="successBox">
        <h2>버그 리포트를 접수했습니다</h2>
        <p id="successText">관리자가 확인 후 상태를 업데이트합니다.</p>
      </div>
    </section>
  </main>

  <script>
    window.AUTH_STATUS_CORNER = true;
  </script>
  <script>
    const loginGate = document.getElementById('loginGate');
    const reportShell = document.getElementById('reportShell');
    const reporterMeta = document.getElementById('reporterMeta');
    const bugReportForm = document.getElementById('bugReportForm');
    const formMessage = document.getElementById('formMessage');
    const submitButton = document.getElementById('submitButton');
    const successBox = document.getElementById('successBox');
    const successText = document.getElementById('successText');
    const reportTitle = document.getElementById('reportTitle');
    const reportDescription = document.getElementById('reportDescription');
    const reportPageUrl = document.getElementById('reportPageUrl');

    function showGate() {
      loginGate.classList.add('active');
      reportShell.classList.add('hidden');
      successBox.classList.remove('active');
    }

    function showForm(user) {
      loginGate.classList.remove('active');
      reportShell.classList.remove('hidden');
      reporterMeta.textContent = user.username + ' 계정으로 제보합니다. 제출 후 관리자에게 알림이 전송됩니다.';
    }

    function showSuccess(reportId) {
      reportShell.classList.add('hidden');
      successBox.classList.add('active');
      successText.textContent = '리포트 #' + reportId + ' 로 접수했습니다. 관리자가 확인 후 상태를 업데이트합니다.';
    }

    async function loadMe() {
      try {
        const response = await fetch('/api/me');
        const data = await response.json();
        const authenticated = data && data.authenticated !== false && data.username;
        if (!authenticated) {
          showGate();
          return null;
        }
        showForm(data);
        return data;
      } catch (error) {
        showGate();
        return null;
      }
    }

    bugReportForm.addEventListener('submit', async function (event) {
      event.preventDefault();
      formMessage.textContent = '';

      const payload = {
        title: reportTitle.value.trim(),
        description: reportDescription.value.trim(),
        page_url: reportPageUrl.value.trim(),
        severity: (document.querySelector('input[name="severity"]:checked') || {}).value || 'normal',
      };

      if (!payload.title || !payload.description) {
        formMessage.textContent = '제목과 설명을 입력하세요.';
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = '제출 중...';

      try {
        const response = await fetch('/api/bug-reports', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) {
          formMessage.textContent = data?.error?.message || '제출에 실패했습니다.';
          return;
        }
        bugReportForm.reset();
        document.querySelector('input[name="severity"][value="normal"]').checked = true;
        showSuccess(data.report.id);
      } catch (error) {
        formMessage.textContent = '제출 중 오류가 발생했습니다.';
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = '제출';
      }
    });

    if (document.referrer) {
      try {
        const ref = new URL(document.referrer);
        if (ref.origin === window.location.origin && ref.pathname !== '/community/bug-report.html') {
          reportPageUrl.value = ref.pathname + ref.search;
        }
      } catch (error) {}
    }

    loadMe();
  </script>
  <script src="/assets/js/auth-status.js"></script>
</body>
</html>
