<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>404 페이지를 찾을 수 없음</title>
  <style>
    :root{
      --bg:#f6f7fb; --surface:#ffffff; --border:#e5e7eb; --text:#111827; --muted:#6b7280;
      --accent:#1d4ed8; --accent-soft:#dbeafe; --primary:#0070f3; --shadow:0 16px 40px rgba(15,23,42,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:radial-gradient(1100px 700px at 20% 0%, #eef4ff, var(--bg) 60%);color:var(--text)}
    .card{width:min(520px,92vw);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:34px 30px;box-shadow:var(--shadow)}
    .badge{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:14px;background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:20px;margin-bottom:18px}
    h1{margin:0;font-size:42px;line-height:1}
    h2{margin:10px 0 12px;font-size:22px}
    p{margin:0 0 10px;color:var(--muted);line-height:1.7}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
    a{display:inline-flex;align-items:center;justify-content:center;padding:11px 18px;border-radius:10px;text-decoration:none;font-weight:600}
    .primary{background:linear-gradient(90deg,#1a7bf7,#0070f3);color:#fff;border:1px solid #1570ef}
    .secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">404</div>
    <h1>404</h1>
    <h2>페이지를 찾을 수 없습니다</h2>
    <p>입력한 주소가 잘못되었거나 페이지가 이동 또는 삭제되었을 수 있습니다.</p>
    <p>경로를 다시 확인하거나 홈으로 이동해 원하는 메뉴를 다시 찾아보세요.</p>
    <div class="actions">
      <a class="primary" href="/">홈으로 이동</a>
      <a class="secondary" href="javascript:history.back()">이전 페이지</a>
    </div>
  </main>
</body>
</html>
