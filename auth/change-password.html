<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>비밀번호 변경</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --text:#111827; --muted:#6b7280;
      --brand:#0070f3; --brand-weak:#e6f0ff; --danger:#dc2626; --success:#1f9d68;
      --border:#e5e7eb; --shadow:0 10px 25px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1100px 700px at 20% 0%, #eef3ff, var(--bg) 60%);
      color:var(--text); display:grid; place-items:center; padding:24px;
    }
    .card{
      width:min(440px, 92vw); background:var(--card); border:1px solid var(--border);
      border-radius:16px; box-shadow:var(--shadow); padding:28px 26px;
    }
    .header{ text-align:center; margin-bottom:18px; }
    .icon{
      width:44px; height:44px; border-radius:12px; display:grid; place-items:center;
      margin:0 auto 10px; background:#fef3c7; font-size:22px; border:1px solid #fde68a;
    }
    h1{font-size:20px; margin:6px 0 4px}
    .sub{color:var(--muted); font-size:13px; margin:0}
    .notice{
      background:#fef3c7; border:1px solid #fde68a; border-radius:8px;
      padding:10px 14px; font-size:13px; color:#92400e; margin-bottom:16px;
    }
    label{display:block; font-size:12px; color:var(--muted); margin:10px 2px 6px}
    .input-wrap{ position:relative; }
    input[type="password"], input[type="text"]{
      width:100%; padding:12px 44px 12px 12px; border:1px solid var(--border); border-radius:10px;
      background:#fff; outline:none; font-size:14px;
      transition: box-shadow .15s ease, border-color .15s ease;
    }
    input:focus{ border-color:#93c5fd; box-shadow:0 0 0 4px rgba(147,197,253,.35) }
    .toggle{
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      border:0; background:transparent; cursor:pointer; padding:6px 8px; color:#6b7280;
    }
    .msg{ margin:10px 0 0; font-size:12px; min-height:1.25em; }
    .msg.err{ color:var(--danger); }
    .msg.ok{ color:var(--success); }
    .actions{ margin-top:16px }
    button[type="submit"]{
      width:100%; padding:12px; border-radius:10px; border:1px solid #1570ef;
      background:linear-gradient(90deg, #1a7bf7, #0070f3); color:#fff; font-weight:600;
      cursor:pointer; transition: filter .15s ease;
    }
    button[type="submit"]:hover{ filter:brightness(.98) }
    button[type="submit"]:disabled{ opacity:.6; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">🔑</div>
      <h1>비밀번호 변경 필요</h1>
      <p class="sub">최초 로그인 또는 관리자에 의해 비밀번호가 초기화되었습니다.</p>
    </div>

    <div class="notice">새 비밀번호를 설정해야 계속 이용할 수 있습니다.</div>

    <form id="changePwForm">
      <label for="newPassword">새 비밀번호 <small>(8자 이상)</small></label>
      <div class="input-wrap">
        <input id="newPassword" type="password" placeholder="새 비밀번호 입력" required minlength="8" autocomplete="new-password" />
        <button class="toggle" type="button" data-target="newPassword">👁️</button>
      </div>

      <label for="confirmPassword">새 비밀번호 확인</label>
      <div class="input-wrap">
        <input id="confirmPassword" type="password" placeholder="비밀번호 재입력" required minlength="8" autocomplete="new-password" />
        <button class="toggle" type="button" data-target="confirmPassword">👁️</button>
      </div>

      <p id="msg" class="msg"></p>

      <div class="actions">
        <button type="submit" id="submitBtn">비밀번호 변경</button>
      </div>
    </form>
  </div>

  <script>
    // 비밀번호 보기 토글
    document.querySelectorAll('.toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const inp = document.getElementById(btn.dataset.target);
        const isPw = inp.type === 'password';
        inp.type = isPw ? 'text' : 'password';
        btn.textContent = isPw ? '🙈' : '👁️';
        inp.focus();
      });
    });

    document.getElementById('changePwForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('msg');
      msgEl.textContent = '';
      msgEl.className = 'msg';

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');

      if (newPassword.length < 8) {
        msgEl.textContent = '비밀번호는 8자 이상이어야 합니다.';
        msgEl.classList.add('err');
        return;
      }
      if (newPassword !== confirmPassword) {
        msgEl.textContent = '비밀번호 확인이 일치하지 않습니다.';
        msgEl.classList.add('err');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '변경 중...';

      try {
        const r = await fetch('/api/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newPassword, confirmPassword }),
        });
        const data = await r.json();

        if (r.ok) {
          msgEl.textContent = '비밀번호가 변경되었습니다. 잠시 후 이동합니다...';
          msgEl.classList.add('ok');
          setTimeout(() => { window.location.href = '/'; }, 1500);
        } else {
          msgEl.textContent = data.error || '변경에 실패했습니다.';
          msgEl.classList.add('err');
          submitBtn.disabled = false;
          submitBtn.textContent = '비밀번호 변경';
        }
      } catch {
        msgEl.textContent = '서버 오류가 발생했습니다.';
        msgEl.classList.add('err');
        submitBtn.disabled = false;
        submitBtn.textContent = '비밀번호 변경';
      }
    });
  </script>
</body>
</html>
