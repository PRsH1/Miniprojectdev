<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>접근 거부 — 403</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1100px 700px at 20% 0%, #fff0f0, #f6f7fb 60%);
      display:grid; place-items:center; padding:24px;
    }
    .card{
      width:min(420px,92vw); background:#fff; border:1px solid #fee2e2;
      border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,.08);
      padding:32px 26px; text-align:center;
    }
    .icon{font-size:48px; margin-bottom:16px;}
    h1{font-size:22px; color:#dc2626; margin-bottom:8px;}
    p{color:#6b7280; font-size:14px; line-height:1.6; margin-bottom:20px;}
    .btn{
      display:inline-block; padding:10px 24px; border-radius:10px;
      background:linear-gradient(90deg,#1a7bf7,#0070f3); color:#fff;
      text-decoration:none; font-weight:600; font-size:14px;
      border:1px solid #1570ef;
    }
    .btn:hover{filter:brightness(.95)}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1>접근 권한 없음</h1>
    <p>이 페이지에 접근할 권한이 없습니다.<br>다른 계정으로 로그인하거나 관리자에게 문의하세요.</p>
    <a href="/auth/login.html" class="btn">로그인 페이지로</a>
  </div>
</body>
</html>
