<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>로그인</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --text:#111827; --muted:#6b7280;
      --brand:#0070f3; --brand-weak:#e6f0ff; --danger:#dc2626; --ring:#93c5fd;
      --border:#e5e7eb; --shadow:0 10px 25px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1100px 700px at 20% 0%, #eef3ff, var(--bg) 60%);
      color:var(--text); display:grid; place-items:center; padding:24px;
    }
    .card{
      width:min(420px, 92vw); background:var(--card); border:1px solid var(--border);
      border-radius:16px; box-shadow:var(--shadow);
      padding:28px 26px;
    }
    .header{
      text-align:center; margin-bottom:18px;
    }
    .lock{
      width:44px; height:44px; border-radius:12px; display:grid; place-items:center;
      margin:0 auto 10px; background:var(--brand-weak); color:var(--brand); font-weight:700;
      border:1px solid #dbeafe;
    }
    h1{font-size:20px; margin:6px 0 4px}
    .sub{color:var(--muted); font-size:13px; margin:0}
    form{margin-top:12px}
    label{display:block; font-size:12px; color:var(--muted); margin:10px 2px 6px}
    .input-wrap{
      position:relative;
    }
    input[type="password"], input[type="text"]{
      width:100%; padding:12px 44px 12px 12px; border:1px solid var(--border); border-radius:10px;
      background:#fff; outline:none; font-size:14px;
      transition: box-shadow .15s ease, border-color .15s ease;
    }
    input:focus{ border-color:#93c5fd; box-shadow:0 0 0 4px rgba(147,197,253,.35) }
    .toggle{
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      border:0; background:transparent; cursor:pointer; padding:6px 8px; color:#6b7280;
    }
    .error{
      margin:10px 0 0; color:var(--danger); font-size:12px; min-height:1.25em;
      text-align:left;
    }
    .actions{ margin-top:16px }
    button[type="submit"]{
      width:100%; padding:12px; border-radius:10px; border:1px solid #1570ef;
      background:linear-gradient(90deg, #1a7bf7, #0070f3); color:#fff; font-weight:600;
      cursor:pointer; transition: filter .15s ease, transform .04s ease;
    }
    button[type="submit"]:hover{ filter:brightness(.98) }
    button[type="submit"]:active{ transform:translateY(1px) }
    .foot{
      margin-top:12px; color:var(--muted); font-size:12px; text-align:center;
    }
  </style>
</head>
<body>
  <div class="card" role="dialog" aria-labelledby="title" aria-describedby="subtitle">
    <div class="header">
      <div class="lock" aria-hidden="true">🔒</div>
      <h1 id="title">보호 페이지 접근</h1>
      <p id="subtitle" class="sub">이 페이지는 인증된 사용자만 접근할 수 있습니다.</p>
    </div>

    <form action="/api/login" method="POST">
      <label for="password">비밀번호</label>
      <div class="input-wrap">
        <input id="password" name="password" type="password" placeholder="암호를 입력하세요" required />
        <button class="toggle" type="button" aria-label="비밀번호 보기" id="toggleBtn">👁️</button>
      </div>

      <input type="hidden" name="next" id="next" />
      <!-- scope: member | templatecopy | apiautotest -->
      <input type="hidden" name="scope" id="scope" />

      <p id="errorMessage" class="error"></p>

      <div class="actions">
        <button type="submit">로그인</button>
      </div>
      <p class="foot">암호 발급은 관리자에게 문의하세요.</p>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const next = params.get('next') || '/';
    const scope = params.get('scope') || 'member';

    document.getElementById('next').value = next;
    document.getElementById('scope').value = scope;

    if (params.has('error')) {
      document.getElementById('errorMessage').textContent = '암호가 올바르지 않습니다.';
    }

    const prettyNameByScope = (s) => {
      if (s === 'templatecopy') return '템플릿 복제 페이지 접근';
      if (s === 'apiautotest') return 'API 자동 테스트 페이지 접근';
      if (s === 'member') return '멤버 페이지 접근';
      if (s === 'idptestauth') return 'IDP 테스트 페이지 접근';
      return '보호 페이지 접근';
    };
    document.getElementById('title').textContent = prettyNameByScope(scope);

    // 비밀번호 보기 토글
    const pwd = document.getElementById('password');
    const tgl = document.getElementById('toggleBtn');
    tgl.addEventListener('click', () => {
      const isPw = pwd.type === 'password';
      pwd.type = isPw ? 'text' : 'password';
      tgl.textContent = isPw ? '🙈' : '👁️';
      tgl.setAttribute('aria-label', isPw ? '비밀번호 숨기기' : '비밀번호 보기');
      pwd.focus();
    });

    // 엔터키 UX 향상: 입력에서 Enter 누르면 제출
    pwd.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') e.target.form?.requestSubmit();
    });
  </script>
</body>
</html>
