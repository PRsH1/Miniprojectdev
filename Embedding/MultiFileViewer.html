<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이폼사인 멀티 보고서 임베딩 (MultiFileViewer)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/8.0.20/jsrsasign-all-min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; display: flex; height: 100vh; color: #333; }
        
        /* 왼쪽 설정 패널 */
        .sidebar { width: 450px; background: #fff; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { margin-top: 0; font-size: 1.4rem; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .sidebar h3 { font-size: 1rem; color: #34495e; margin-top: 20px; margin-bottom: 10px; border-left: 4px solid #3498db; padding-left: 8px; }

        /* 폼 요소 */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; box-sizing: border-box; }
        .form-group input:read-only { background-color: #f8f9fa; color: #777; }
        
        /* 버튼 */
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-success { background-color: #2ecc71; color: white; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-dark { background-color: #34495e; color: white; }
        .btn-outline { background-color: transparent; border: 1px solid #3498db; color: #3498db; }
        .btn-outline:hover { background-color: #eaf6ff; }
        .btn-danger { background-color: #e74c3c; color: white; width: auto; padding: 4px 8px; font-size: 0.8rem; }

        /* 파일 리스트 카드 */
        .file-card { background: #f8f9fa; border: 1px solid #e9ecef; border-left: 3px solid #2ecc71; padding: 10px; margin-bottom: 10px; border-radius: 4px; position: relative; }
        .file-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .file-header span { font-weight: bold; font-size: 0.9rem; color: #2ecc71; }
        
        /* 오른쪽 뷰어 영역 */
        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; position: relative; }
        .viewer-container { flex: 1; background: #fff; border-radius: 8px; border: 1px solid #ddd; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* 상태 표시 */
        #statusMsg { font-size: 0.85rem; color: #e67e22; font-weight: bold; margin-left: 10px; }
        
        /* Export 버튼 그룹 */
        .export-group { display: flex; gap: 5px; margin-top: 5px; }
        .export-group .btn { margin-top: 0; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Multi Report Embedding</h2>
        
        <div class="form-group">
            <label>1. 환경 선택 (Environment)</label>
            <select id="envSelect" onchange="loadLibrary(this.value)">
                <option value="saas">SaaS (eformsign.com)</option>
                <option value="csap">CSAP (gov-eformsign.com)</option>
                </select>
            <div style="margin-top:5px; font-size:0.8rem;">
                상태: <span id="libStatus">라이브러리 로딩 대기</span>
            </div>
        </div>

        <h3>2. API 인증 (Token)</h3>
        <div class="form-group"><label>Company ID</label><input type="text" id="companyId" placeholder="회사 ID"></div>
        <div class="form-group"><label>User ID (Member)</label><input type="text" id="userId" placeholder="사용자 ID (Email)"></div>
        <div class="form-group"><label>API Key</label><input type="password" id="apiKey" placeholder="API Key"></div>
        <div class="form-group"><label>Private Key (Hex)</label><input type="password" id="privateKey" placeholder="Private Key (Hex)"></div>
        <button class="btn btn-dark" onclick="getAccessToken()">토큰 발급 받기</button>
        
        <div class="form-group" style="margin-top:10px;">
            <label>Access Token</label>
            <input type="text" id="accessToken" readonly placeholder="발급된 토큰">
        </div>
        <div class="form-group">
            <label>Refresh Token</label>
            <input type="text" id="refreshToken" readonly placeholder="발급된 토큰">
        </div>

        <h3>3. 문서 구성 (File Info)</h3>
        <div class="form-group">
            <label>사용자 유형 (Viewer User)</label>
            <select id="userType">
                <option value="01">내부자 (Member)</option>
                <option value="02" selected>외부자 (External)</option>
            </select>
        </div>
        <div class="form-group">
            <label>외부자 이름 (Type 02인 경우)</label>
            <input type="text" id="externalName" value="홍길동">
        </div>
        <div class="form-group">
            <label>모드 (Mode)</label>
            <select id="viewMode">
                <option value="default">문서 작성/수정 (Default)</option>
                <option value="preview">미리보기 (Preview)</option>
            </select>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
            <label>파일 목록</label>
            <button class="btn btn-outline" style="width:auto; padding:5px 10px;" onclick="addFileEntry()">+ 추가</button>
        </div>
        <div id="fileListContainer">
            </div>

        <h3>4. 뷰어 실행</h3>
        <button class="btn btn-success" onclick="startMultiViewer()">Start Multi Viewer</button>

        <h3>5. Export 제어</h3>
        <div class="export-group">
            <button class="btn btn-primary" onclick="executeExport('01')">Export (01: OZR/Modified)</button>
            <button class="btn btn-primary" onclick="executeExport('02')">Export (02: All)</button>
        </div>
    </div>

    <div class="main-content">
        <div class="viewer-container" id="viewerContainer">
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; color:#999;">
                <p>Start 버튼을 누르면<br>멀티 뷰어가 실행됩니다.</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 설정 및 초기화 ---
        const ENV_CONFIG = {
            saas: {
                apiUrl: "https://api.eformsign.com/v2.0/api_auth/access_token",
                script: "https://www.eformsign.com/lib/js/efs_embedded_v2.js"
            },
            csap: {
                apiUrl: "https://www.gov-eformsign.com/Service/v2.0/api_auth/access_token",
                script: "https://www.gov-eformsign.com/lib/js/efs_embedded_v2.js"
            }
        };

        let currentEnv = 'saas';
        let multiViewerInstance = null; // 뷰어 인스턴스 저장

        // 페이지 로드 시 기본 라이브러리 로드
        window.onload = function() {
            loadLibrary('saas');
            addFileEntry(); // 기본 파일 입력창 1개 추가
        };

        function loadLibrary(env) {
            currentEnv = env;
            const scriptSrc = ENV_CONFIG[env].script;
            
            // 기존 스크립트 제거
            const oldScript = document.getElementById('efsLib');
            if(oldScript) oldScript.remove();

            // 새 스크립트 로드
            const script = document.createElement('script');
            script.id = 'efsLib';
            script.src = scriptSrc;
            script.onload = () => {
                document.getElementById('libStatus').innerText = "로드 완료 (" + env + ")";
                document.getElementById('libStatus').style.color = "blue";
                console.log("Library Loaded:", env);
            };
            document.head.appendChild(script);
        }

        // --- 2. 파일 목록 UI 관리 ---
        function addFileEntry() {
            const container = document.getElementById('fileListContainer');
            const index = container.children.length + 1;
            
            const html = `
                <div class="file-card">
                    <div class="file-header">
                        <span>File #${index}</span>
                        <button class="btn btn-danger" onclick="this.parentElement.parentElement.remove()">삭제</button>
                    </div>
                    <div class="form-group">
                        <select class="file-type">
                            <option value="01">01: 템플릿(신규 작성)</option>
                            <option value="02">02: 문서(임시저장/완료)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="text" class="file-id" placeholder="Template ID or Document ID">
                    </div>
                    <div class="form-group">
                        <input type="text" class="file-title" placeholder="문서 제목 (Title)">
                    </div>
                </div>
            `;
            // insertAdjacentHTML을 사용하여 DOM 파싱 최소화
            container.insertAdjacentHTML('beforeend', html);
        }

        // --- 3. 토큰 발급 (Signature 방식) ---
        function getAccessToken() {
            const companyId = document.getElementById('companyId').value;
            const memberId = document.getElementById('userId').value;
            const apiKey = document.getElementById('apiKey').value;
            const privateKey = document.getElementById('privateKey').value;
            const apiUrl = ENV_CONFIG[currentEnv].apiUrl;

            if(!memberId || !apiKey || !privateKey) {
                alert("인증 정보를 모두 입력해주세요.");
                return;
            }

            const executionTime = Date.now() + "";
            let signatureValue = "";

            try {
                // 서명 생성
                const pk = KEYUTIL.getKeyFromPlainPrivatePKCS8Hex(privateKey);
                const sig = new KJUR.crypto.Signature({ alg: "SHA256withECDSA" });
                sig.init(pk);
                sig.updateString(executionTime);
                signatureValue = sig.sign();
            } catch (e) {
                alert("Private Key 형식이 올바르지 않습니다. (Hex 포맷 확인)");
                console.error(e);
                return;
            }

            // API 호출
            $.ajax({
                url: apiUrl,
                type: "POST",
                contentType: "application/json; charset=UTF-8",
                data: JSON.stringify({
                    "execution_time": executionTime,
                    "member_id": memberId
                }),
                beforeSend: function(xhr) {
                    xhr.setRequestHeader("eformsign_signature", signatureValue);
                    xhr.setRequestHeader("Authorization", "Bearer " + btoa(apiKey));
                },
                success: function(res) {
                    document.getElementById('accessToken').value = res.oauth_token.access_token;
                    document.getElementById('refreshToken').value = res.oauth_token.refresh_token;
                    if(!document.getElementById('companyId').value) {
                        document.getElementById('companyId').value = res.api_key.company.company_id;
                    }
                    alert("토큰 발급 성공!");
                },
                error: function(err) {
                    console.error(err);
                    alert("토큰 발급 실패: " + (err.responseJSON ? err.responseJSON.ErrorMessage : err.statusText));
                }
            });
        }

        // --- 4. 뷰어 실행 로직 (핵심) ---
        function startMultiViewer() {
            if (typeof MultiFileViewer === "undefined") {
                alert("MultiFileViewer 라이브러리가 로드되지 않았습니다.");
                return;
            }

            const accessToken = document.getElementById('accessToken').value;
            const memberId = document.getElementById('userId').value;
            const companyId = document.getElementById('companyId').value;

            if (!accessToken) {
                alert("먼저 액세스 토큰을 발급받아주세요.");
                return;
            }

            // 4-1. User Info 구성
            const userType = document.getElementById('userType').value;
            const userInfo = {
                'user_type': userType,
                'user_id': memberId, // 01이면 멤버 ID, 02면 식별자
                'company_id': companyId,
                'access_token': accessToken,
                'refresh_token': document.getElementById('refreshToken').value
            };

            // 외부자일 경우 이름 추가
            if(userType === '02') {
                userInfo.user_name = document.getElementById('externalName').value;
            }

            // 4-2. File Info 구성 (UI 루프)
            const fileCards = document.querySelectorAll('.file-card');
            const fileInfos = [];

            fileCards.forEach(card => {
                const type = card.querySelector('.file-type').value;
                const id = card.querySelector('.file-id').value;
                const title = card.querySelector('.file-title').value;

                if (id) {
                    fileInfos.push({
                        "type": type,
                        "id": id,
                        "title": title || "Untitled",
                        "displayTitle": title || "Untitled",
                        // 필요시 OZParams, inputParams, custom_datas 추가 가능
                        "custom_datas": [] 
                    });
                }
            });

            if (fileInfos.length === 0) {
                alert("최소 1개 이상의 파일을 입력해주세요.");
                return;
            }

            // 4-3. 최종 Viewer Data 구성 (요청하신 포맷 준수)
            const viewerData = {
                'user_info': userInfo,
                'mode': document.getElementById('viewMode').value, // preview or default
                'export_type': 'file',
                'save_type': 'all',
                'viewer_option': {
                    'toolbar.print': 'true' // 툴바 인쇄 버튼 활성화 예시
                },
                'layout': {
                    'viewer_toolbar': {
                        'toolbar.custombuttons': [
                            {
                                'type': 'masking',
                                'options': {
                                    'min_defaultsize': '16,16',
                                    'max_defaultsize': '200,200'
                                }
                            }
                        ]
                    }
                },
                'file_info': fileInfos
            };

            console.log("🚀 Initializing MultiFileViewer with:", viewerData);

            try {
                // 인스턴스 생성
                multiViewerInstance = new MultiFileViewer();
                
                // 데이터 주입
                multiViewerInstance.setMultiFileInfo(viewerData);
                
                // 뷰어 오픈
                // 참고: MultiFileViewer는 기본적으로 전체 화면 오버레이로 뜰 수 있습니다.
                eformsign.open();
                
            } catch (e) {
                console.error("Viewer Error:", e);
                alert("뷰어 실행 중 오류가 발생했습니다. 콘솔을 확인하세요.");
            }
        }

        // --- 5. Export 기능 ---
        function executeExport(type) {
            if (!multiViewerInstance) {
                alert("뷰어가 실행되지 않았습니다.");
                return;
            }
            // type '01': 수정된 파일/OZR, '02': 전체 파일
            console.log("Requesting Export:", type);
            multiViewerInstance.exportFile(type);
        }

    </script>
<script src="/assets/js/auth-status.js"></script>
</body>
</html>
